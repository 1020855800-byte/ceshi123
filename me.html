<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Me</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial,
          "PingFang SC", "Microsoft YaHei", sans-serif;
        line-height: 1.6;
        background: #0a0f1c;
        color: #e6edf3;
      }
      .container {
        max-width: 920px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      .card {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        padding: 22px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 26px;
      }
      .muted {
        color: rgba(230, 237, 243, 0.8);
        margin: 0 0 18px;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
      }
      a.btn {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.1);
        color: #e6edf3;
        text-decoration: none;
      }
      a.btn:hover {
        background: rgba(255, 255, 255, 0.16);
      }
      .tag {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.08);
        margin-right: 8px;
        margin-top: 8px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>这里是 me.html</h1>
        <p class="muted">
          这是一个简单的“我的页面”示例，你可以在这里放个人简介、设置入口等。
        </p>

        <div>
          <span class="tag">Profile</span>
          <span class="tag">Settings</span>
          <span class="tag">About</span>
        </div>

        <div class="row">
          <a class="btn" href="./index.html">返回首页</a>
        </div>
      </section>
    </main>
  </body>
</html>
